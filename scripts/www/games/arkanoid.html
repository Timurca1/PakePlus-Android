<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🧱 Арканоид</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .game-wrapper { max-width: 560px; margin: 0 auto; }
        .canvas-wrapper { position: relative; border-radius: 12px; overflow: hidden; background: #0a0a1a; touch-action: none; }
        canvas { display: block; width: 100%; height: auto; touch-action: none; }
        .game-overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: rgba(0,0,0,0.75); backdrop-filter: blur(8px);
            opacity: 0; pointer-events: none; transition: opacity 0.4s; border-radius: 12px;
            z-index: 5;
        }
        .game-overlay.active { opacity: 1; pointer-events: all; }
        .game-overlay h2 { font-size: 32px; color: #ff6b6b; }
        .game-overlay .btn { margin-top: 16px; padding: 12px 36px; background: #ff6b6b; border: none; border-radius: 10px; color: #fff; font-weight: 700; font-size: 16px; cursor: pointer; transition: transform 0.2s; }
        .game-overlay .btn:hover { transform: scale(1.05); }
        
        #touch-controls {
            position: absolute !important;
            bottom: 15px !important;
            left: 0 !important;
            right: 0 !important;
            display: none !important;
            justify-content: space-between !important;
            padding: 0 15px !important;
            pointer-events: none !important;
            z-index: 10 !important;
        }
        #touch-controls .btn-group {
            display: flex !important;
            gap: 10px !important;
            pointer-events: all !important;
        }
        #touch-controls button {
            width: 65px !important;
            height: 65px !important;
            border-radius: 50% !important;
            border: 2px solid rgba(255,255,255,0.2) !important;
            background: rgba(255,255,255,0.1) !important;
            backdrop-filter: blur(8px) !important;
            color: white !important;
            font-size: 28px !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            touch-action: none !important;
            user-select: none !important;
            -webkit-user-select: none !important;
            transition: background 0.15s !important;
            pointer-events: all !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3) !important;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5) !important;
            padding: 0 !important;
            line-height: 1 !important;
        }
        #touch-controls button:active {
            background: rgba(255,255,255,0.3) !important;
            transform: scale(0.9) !important;
        }
        @media (max-width: 600px) {
            #touch-controls { display: flex !important; }
            #touch-controls button { width: 55px !important; height: 55px !important; font-size: 22px !important; }
        }
        @media (pointer: coarse) {
            #touch-controls { display: flex !important; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="game-header">
        <h2>🧱 Арканоид</h2>
        <div class="stats"><span>🏆 <b id="score">0</b></span><span>❤️ <b id="lives">3</b></span></div>
        <a href="../index.html" class="menu-btn">← Меню</a>
    </div>
    <div class="canvas-wrapper">
        <canvas id="game" width="500" height="400"></canvas>
        <div class="game-overlay" id="overlay">
            <h2>🧱 Арканоид</h2>
            <p style="color:#888;margin:4px 0;">🖱️ Мышь / ⬅➡</p>
            <button class="btn" id="startBtn">▶ Начать</button>
        </div>
        
        <div id="touch-controls">
            <div class="btn-group">
                <button data-action="left">⬅</button>
                <button data-action="right">➡</button>
            </div>
            <div class="btn-group">
                <button data-action="restart" style="width:55px !important;height:55px !important;font-size:22px !important;">🔄</button>
            </div>
        </div>
    </div>
    <div class="game-controls">
        <div class="keys"><kbd>🖱</kbd><kbd>⬅</kbd><kbd>➡</kbd></div>
        <button class="reset-btn" onclick="resetGame()">🔄 Новая</button>
    </div>
</div>
<script src="../engine.js"></script>
<script>
const W = 500, H = 400;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');

// ===== СОСТОЯНИЕ =====
const paddle = {x: W/2-50, y: 370, w: 100, h: 12};
const ball = {x: W/2, y: 350, r: 8, dx: 5, dy: -6, speed: 6};
let bricks = [];
let particles = [];
let score = 0, lives = 3;
let gameRunning = false, gameOver = false, win = false;
let animId = null, lastTime = 0;
let keys = {};
let touchX = null;

document.getElementById('score').textContent = '0';
document.getElementById('lives').textContent = '3';

// ===== СЕНСОРНОЕ УПРАВЛЕНИЕ =====
function setupTouchControls() {
    const buttons = document.querySelectorAll('#touch-controls button[data-action]');
    buttons.forEach(btn => {
        const action = btn.dataset.action;
        const isLeft = action === 'left';
        const isRight = action === 'right';
        
        let interval = null;
        const startPress = (e) => {
            e.preventDefault();
            if (!gameRunning || gameOver || win) return;
            if (isLeft) { paddle.x = Math.max(0, paddle.x - 15); }
            if (isRight) { paddle.x = Math.min(W - paddle.w, paddle.x + 15); }
            // Повтор при зажатии
            interval = setInterval(() => {
                if (!gameRunning || gameOver || win) { clearInterval(interval); return; }
                if (isLeft) { paddle.x = Math.max(0, paddle.x - 12); }
                if (isRight) { paddle.x = Math.min(W - paddle.w, paddle.x + 12); }
            }, 50);
            btn.style.background = 'rgba(255,255,255,0.3)';
        };
        const endPress = (e) => {
            e.preventDefault();
            clearInterval(interval);
            btn.style.background = 'rgba(255,255,255,0.1)';
        };
        btn.addEventListener('touchstart', startPress, { passive: false });
        btn.addEventListener('touchend', endPress, { passive: false });
        btn.addEventListener('touchcancel', endPress, { passive: false });
        btn.addEventListener('mousedown', startPress);
        btn.addEventListener('mouseup', endPress);
        btn.addEventListener('mouseleave', endPress);
    });
    
    // Движение пальцем по экрану
    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (!gameRunning || gameOver || win) return;
        const rect = canvas.getBoundingClientRect();
        const scale = W / rect.width;
        const touch = e.touches[0];
        const x = (touch.clientX - rect.left) * scale;
        paddle.x = Math.max(0, Math.min(W - paddle.w, x - paddle.w/2));
    }, { passive: false });
}

// ===== БЛОКИ =====
const COLORS = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ce93d8'];

function createBricks() {
    bricks = [];
    for (let r=0; r<5; r++) {
        for (let c=0; c<8; c++) {
            const hp = r < 2 ? 2 : 1;
            bricks.push({
                x: 10 + c*60 + 4,
                y: 25 + r*24 + 4,
                w: 54, h: 20,
                hp: hp,
                maxHp: hp,
                color: COLORS[r % COLORS.length],
                alive: true
            });
        }
    }
}

function addParticles(x, y, color, count=15) {
    for (let i=0; i<count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1 + Math.random() * 4;
        particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 1,
            life: 20 + Math.random() * 20,
            maxLife: 40,
            size: 2 + Math.random() * 3,
            color: color
        });
    }
}

// ===== ОБНОВЛЕНИЕ =====
function update(dt) {
    if (!gameRunning || gameOver || win) return;
    
    ball.x += ball.dx * dt;
    ball.y += ball.dy * dt;
    
    if (ball.x - ball.r < 0 || ball.x + ball.r > W) { ball.dx *= -1; Sound.play('move'); }
    if (ball.y - ball.r < 0) { ball.dy *= -1; Sound.play('move'); }
    
    if (ball.y + ball.r > H) {
        lives--;
        document.getElementById('lives').textContent = lives;
        Sound.play('lose');
        if (lives <= 0) { gameOver = true; gameRunning = false; return; }
        resetBall();
        return;
    }
    
    if (ball.dy > 0 && ball.y + ball.r >= paddle.y && 
        ball.y + ball.r <= paddle.y + paddle.h + 5 &&
        ball.x >= paddle.x - ball.r && ball.x <= paddle.x + paddle.w + ball.r) {
        ball.dy = -ball.dy;
        const hit = (ball.x - paddle.x) / paddle.w;
        ball.dx = (hit - 0.5) * 8;
        ball.dy = -Math.sqrt(ball.speed*ball.speed - ball.dx*ball.dx);
        Sound.play('click');
    }
    
    for (let i=0; i<bricks.length; i++) {
        const b = bricks[i];
        if (!b.alive) continue;
        if (ball.x + ball.r > b.x && ball.x - ball.r < b.x + b.w &&
            ball.y + ball.r > b.y && ball.y - ball.r < b.y + b.h) {
            b.hp--;
            if (b.hp <= 0) {
                b.alive = false;
                score += 10;
                document.getElementById('score').textContent = score;
                addParticles(b.x + b.w/2, b.y + b.h/2, b.color);
                Sound.play('click');
            } else {
                addParticles(b.x + b.w/2, b.y + b.h/2, b.color, 5);
                Sound.play('move');
            }
            const ox = Math.min(ball.x + ball.r - b.x, b.x + b.w - (ball.x - ball.r));
            const oy = Math.min(ball.y + ball.r - b.y, b.y + b.h - (ball.y - ball.r));
            if (ox < oy) ball.dx *= -1;
            else ball.dy *= -1;
            break;
        }
    }
    
    if (bricks.every(b => !b.alive)) {
        win = true;
        gameRunning = false;
        Sound.play('win');
    }
    
    for (let i=particles.length-1; i>=0; i--) {
        const p = particles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 0.1 * dt;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
    }
}

function resetBall() {
    ball.x = W/2;
    ball.y = paddle.y - ball.r;
    ball.dx = (Math.random() - 0.5) * 4;
    ball.dy = -5;
    ball.speed = 6;
}

// ===== ОТРИСОВКА =====
function render() {
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0, 0, W, H);
    
    bricks.forEach(b => {
        if (!b.alive) return;
        ctx.shadowColor = b.color;
        ctx.shadowBlur = 10;
        ctx.fillStyle = b.color;
        ctx.fillRect(b.x, b.y, b.w, b.h);
        ctx.shadowBlur = 0;
        if (b.hp > 1) {
            ctx.fillStyle = '#fff';
            ctx.font = '11px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(b.hp, b.x + b.w/2, b.y + b.h/2 + 1);
        }
    });
    
    ctx.shadowColor = '#4ecdc4';
    ctx.shadowBlur = 20;
    ctx.fillStyle = '#4ecdc4';
    ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);
    ctx.shadowBlur = 0;
    
    ctx.shadowColor = '#fff';
    ctx.shadowBlur = 25;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
    
    particles.forEach(p => {
        const alpha = p.life / p.maxLife;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI*2);
        ctx.fill();
    });
    ctx.globalAlpha = 1;
    
    if (gameOver || win) {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, H/2-50, W, 100);
        ctx.fillStyle = win ? '#4ecdc4' : '#ff6b6b';
        ctx.font = 'bold 30px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(win ? '🎉 Победа!' : '💀 Проигрыш', W/2, H/2+6);
    }
}

// ===== КЛАВИАТУРА =====
document.addEventListener('keydown', e => {
    keys[e.key] = true;
    if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

function movePaddle() {
    if (!gameRunning || gameOver || win) { requestAnimationFrame(movePaddle); return; }
    if (keys['ArrowLeft']) paddle.x = Math.max(0, paddle.x - 10);
    if (keys['ArrowRight']) paddle.x = Math.min(W - paddle.w, paddle.x + 10);
    requestAnimationFrame(movePaddle);
}

// ===== ОВЕРЛЕЙ =====
function showOverlay(title, sub) {
    overlay.querySelector('h2').textContent = title;
    overlay.querySelector('p').textContent = sub || '';
    overlay.classList.add('active');
}
function hideOverlay() { overlay.classList.remove('active'); }

// ===== ЦИКЛ =====
function loop(timestamp) {
    if (!gameRunning) { animId = requestAnimationFrame(loop); return; }
    if (!lastTime) lastTime = timestamp;
    const dt = Math.min(timestamp - lastTime, 33) / 16.67;
    lastTime = timestamp;
    
    update(dt);
    render();
    animId = requestAnimationFrame(loop);
}

// ===== РЕСТАРТ =====
function resetGame() {
    if (animId) cancelAnimationFrame(animId);
    particles = [];
    score = 0;
    lives = 3;
    gameOver = false;
    win = false;
    gameRunning = true;
    document.getElementById('score').textContent = '0';
    document.getElementById('lives').textContent = '3';
    paddle.x = W/2 - 50;
    createBricks();
    resetBall();
    lastTime = 0;
    hideOverlay();
    animId = requestAnimationFrame(loop);
}

startBtn.addEventListener('click', resetGame);

// ===== СТАРТ =====
createBricks();
resetBall();
setupTouchControls();
showOverlay('🧱 Арканоид', 'Нажми "Начать"');
movePaddle();
</script>
</body>
</html>
