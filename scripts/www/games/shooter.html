<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 Тир</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .game-wrapper { max-width: 560px; }
        canvas { display: block; width: 100%; height: auto; background: #0a0a1a; border-radius: 12px; cursor: crosshair; }
        .game-overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: rgba(0,0,0,0.75); backdrop-filter: blur(8px);
            opacity: 0; pointer-events: none; transition: opacity 0.4s; border-radius: 12px;
        }
        .game-overlay.active { opacity: 1; pointer-events: all; }
        .game-overlay h2 { font-size: 32px; color: #ef5350; }
        .game-overlay .btn { margin-top: 16px; padding: 12px 36px; background: #ef5350; border: none; border-radius: 10px; color: #fff; font-weight: 700; font-size: 16px; cursor: pointer; transition: transform 0.2s; }
        .game-overlay .btn:hover { transform: scale(1.05); }
        .result-stats { display: flex; gap: 30px; margin-top: 10px; color: #888; font-size: 14px; }
        .result-stats b { color: #ffd93d; font-size: 18px; }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="game-header">
        <h2>🎯 Тир</h2>
        <div class="stats"><span>🏆 <b id="score">0</b></span><span>🎯 <b id="hits">0</b></span><span>⏱️ <b id="timer">30</b></span></div>
        <a href="../index.html" class="menu-btn">← Меню</a>
    </div>
    <div style="position:relative;">
        <canvas id="game" width="500" height="400"></canvas>
        <div class="game-overlay" id="overlay">
            <h2>🎯 Тир</h2>
            <p style="color:#888;margin:4px 0;">Клик по мишеням</p>
            <div class="result-stats" id="resultStats" style="display:none;">
                <span>Счёт: <b id="resultScore">0</b></span>
                <span>Попаданий: <b id="resultHits">0</b></span>
            </div>
            <button class="btn" id="startBtn">▶ Начать</button>
        </div>
    </div>
    <div class="game-controls">
        <div class="keys"><kbd>🖱</kbd></div>
        <button class="reset-btn" onclick="resetGame()">🔄 Новая</button>
    </div>
</div>
<script src="../engine.js"></script>
<script>
const W = 500, H = 400;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');

let targets = [];
let particles = [];
let score = 0, hits = 0, timeLeft = 30;
let gameRunning = false, gameOver = false;
let animId = null, lastTime = 0, timerInterval = null;
let mouseX = W/2, mouseY = H/2;
let isTimeUp = false;

document.getElementById('timer').textContent = timeLeft;

// ===== МИШЕНИ =====
function addTarget() {
    if (!gameRunning || gameOver) return;
    const r = 20 + Math.random() * 18;
    targets.push({
        x: r + Math.random()*(W-r*2),
        y: r + Math.random()*(H-r*2),
        r: r,
        dx: (Math.random()-0.5)*4,
        dy: (Math.random()-0.5)*4,
        life: 150 + Math.random()*100,
        maxLife: 250,
        color: `hsl(${Math.random()*360}, 80%, 55%)`
    });
}

function addParticles(x, y, color, count=20) {
    for (let i=0; i<count; i++) {
        const a = Math.random()*Math.PI*2;
        const s = 1+Math.random()*4;
        particles.push({
            x, y,
            vx: Math.cos(a)*s,
            vy: Math.sin(a)*s-1,
            life: 15+Math.random()*20,
            maxLife: 35,
            size: 2+Math.random()*3,
            color: color
        });
    }
}

// ===== ОТРИСОВКА =====
function render() {
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0, 0, W, H);
    
    targets.forEach(t => {
        const pulse = 1 + Math.sin(Date.now()/200 + t.x)*0.05;
        const r = t.r * pulse;
        ctx.shadowColor = t.color;
        ctx.shadowBlur = 20;
        ctx.fillStyle = t.color;
        ctx.beginPath();
        ctx.arc(t.x, t.y, r, 0, Math.PI*2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(t.x, t.y, r*0.6, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = t.color;
        ctx.beginPath();
        ctx.arc(t.x, t.y, r*0.3, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(t.x, t.y, r*0.1, 0, Math.PI*2);
        ctx.fill();
    });
    
    if (!gameOver) {
        ctx.strokeStyle = 'rgba(255,255,255,0.15)';
        ctx.lineWidth = 1.5;
        const s = 10;
        ctx.beginPath();
        ctx.moveTo(mouseX-s, mouseY); ctx.lineTo(mouseX-4, mouseY);
        ctx.moveTo(mouseX+4, mouseY); ctx.lineTo(mouseX+s, mouseY);
        ctx.moveTo(mouseX, mouseY-s); ctx.lineTo(mouseX, mouseY-4);
        ctx.moveTo(mouseX, mouseY+4); ctx.lineTo(mouseX, mouseY+s);
        ctx.stroke();
        ctx.strokeStyle = 'rgba(255,255,255,0.05)';
        ctx.beginPath();
        ctx.arc(mouseX, mouseY, s*1.8, 0, Math.PI*2);
        ctx.stroke();
    }
    
    particles.forEach(p => {
        const a = p.life/p.maxLife;
        ctx.globalAlpha = a;
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size*a, 0, Math.PI*2);
        ctx.fill();
    });
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
    
    if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, H/2-50, W, 100);
        ctx.fillStyle = isTimeUp ? '#ffd93d' : '#ef5350';
        ctx.font = 'bold 28px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(isTimeUp ? '⏰ Время вышло!' : '💀 Остановлено', W/2, H/2+6);
        ctx.fillStyle = '#888';
        ctx.font = '16px Arial';
        ctx.fillText(`Счёт: ${score} | Попаданий: ${hits}`, W/2, H/2+44);
    }
}

// ===== ОБНОВЛЕНИЕ =====
function update(dt) {
    if (!gameRunning || gameOver) return;
    
    if (targets.length < 8 && Math.random() < 0.035) addTarget();
    
    for (let i=targets.length-1; i>=0; i--) {
        const t = targets[i];
        t.x += t.dx * dt;
        t.y += t.dy * dt;
        t.life--;
        if (t.x - t.r < 0 || t.x + t.r > W) t.dx *= -1;
        if (t.y - t.r < 0 || t.y + t.r > H) t.dy *= -1;
        if (t.life <= 0) targets.splice(i, 1);
    }
    
    for (let i=particles.length-1; i>=0; i--) {
        const p = particles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 0.1 * dt;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
    }
}

// ===== ВЫСТРЕЛ =====
function shoot(e) {
    if (!gameRunning || gameOver) return;
    const rect = canvas.getBoundingClientRect();
    const scaleX = W/rect.width, scaleY = H/rect.height;
    const x = (e.clientX - rect.left)*scaleX;
    const y = (e.clientY - rect.top)*scaleY;
    
    Sound.play('click');
    addParticles(x, y, '#ffd93d', 8);
    
    for (let i=targets.length-1; i>=0; i--) {
        const t = targets[i];
        if (Math.sqrt((x-t.x)**2 + (y-t.y)**2) < t.r) {
            score += 10 + Math.floor((t.maxLife-t.life)/20);
            hits++;
            document.getElementById('score').textContent = score;
            document.getElementById('hits').textContent = hits;
            addParticles(t.x, t.y, t.color, 25);
            Sound.play('win');
            targets.splice(i, 1);
            return;
        }
    }
}

canvas.addEventListener('click', shoot);
canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    const scaleX = W/rect.width, scaleY = H/rect.height;
    mouseX = (e.clientX - rect.left)*scaleX;
    mouseY = (e.clientY - rect.top)*scaleY;
});

// ===== ТАЙМЕР =====
function startTimer() {
    timeLeft = 30;
    document.getElementById('timer').textContent = timeLeft;
    isTimeUp = false;
    timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById('timer').textContent = timeLeft;
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            timerInterval = null;
            // Останавливаем игру
            gameOver = true;
            gameRunning = false;
            isTimeUp = true;
            Sound.play('lose');
            // Показываем результат
            showResultOverlay();
        }
    }, 1000);
}

// ===== РЕЗУЛЬТАТ =====
function showResultOverlay() {
    document.getElementById('resultStats').style.display = 'flex';
    document.getElementById('resultScore').textContent = score;
    document.getElementById('resultHits').textContent = hits;
    overlay.querySelector('h2').textContent = '⏰ Время вышло!';
    overlay.querySelector('p').textContent = 'Попробуй ещё раз';
    overlay.classList.add('active');
}

// ===== ОВЕРЛЕЙ =====
function showOverlay(title, sub) {
    document.getElementById('resultStats').style.display = 'none';
    overlay.querySelector('h2').textContent = title;
    overlay.querySelector('p').textContent = sub || '';
    overlay.classList.add('active');
}
function hideOverlay() { overlay.classList.remove('active'); }

// ===== ЦИКЛ =====
function loop(timestamp) {
    if (!gameRunning) { 
        animId = requestAnimationFrame(loop); 
        return; 
    }
    if (!lastTime) lastTime = timestamp;
    const dt = Math.min(timestamp - lastTime, 33) / 16.67;
    lastTime = timestamp;
    
    update(dt);
    render();
    animId = requestAnimationFrame(loop);
}

// ===== РЕСТАРТ =====
function resetGame() {
    // Останавливаем всё
    if (animId) cancelAnimationFrame(animId);
    if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
    }
    
    targets = [];
    particles = [];
    score = 0;
    hits = 0;
    gameOver = false;
    isTimeUp = false;
    gameRunning = true;
    lastTime = 0;
    
    document.getElementById('score').textContent = '0';
    document.getElementById('hits').textContent = '0';
    
    hideOverlay();
    startTimer();
    animId = requestAnimationFrame(loop);
}

startBtn.addEventListener('click', resetGame);

// ===== СТАРТ =====
showOverlay('🎯 Тир', 'Нажми "Начать"');
</script>
</body>
</html>
