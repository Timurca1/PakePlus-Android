<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 Змейка</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .game-wrapper { max-width: 460px; }
        canvas { display: block; width: 100%; height: auto; background: #0a0a1a; border-radius: 12px; }
        .game-overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: rgba(0,0,0,0.75); backdrop-filter: blur(8px);
            opacity: 0; pointer-events: none; transition: opacity 0.4s; border-radius: 12px;
        }
        .game-overlay.active { opacity: 1; pointer-events: all; }
        .game-overlay h2 { font-size: 32px; color: #4ecdc4; }
        .game-overlay .btn { margin-top: 16px; padding: 12px 36px; background: #4ecdc4; border: none; border-radius: 10px; color: #0a0a1a; font-weight: 700; font-size: 16px; cursor: pointer; transition: transform 0.2s; }
        .game-overlay .btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="game-header">
        <h2>🐍 Змейка</h2>
        <div class="stats"><span>🏆 <b id="score">0</b></span><span>👑 <b id="high">0</b></span></div>
        <a href="../index.html" class="menu-btn">← Меню</a>
    </div>
    <div style="position:relative;">
        <canvas id="game" width="400" height="400"></canvas>
        <div class="game-overlay" id="overlay">
            <h2>🐍 Змейка</h2>
            <p style="color:#888;margin:4px 0;">⬆⬇⬅➡</p>
            <button class="btn" id="startBtn">▶ Начать</button>
        </div>
    </div>
    <div class="game-controls">
        <div class="keys"><kbd>⬆</kbd><kbd>⬇</kbd><kbd>⬅</kbd><kbd>➡</kbd></div>
        <button class="reset-btn" onclick="resetGame()">🔄 Новая</button>
    </div>
</div>
<script src="../engine.js"></script>
<script>
const GRID = 20, CELL = 20;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');

// ===== СОСТОЯНИЕ =====
let snake = [];
let food = null;
let dir = {x:1, y:0};
let nextDir = {x:1, y:0};
let score = 0;
let high = Records.get('snake') || 0;
let gameRunning = false;
let gameOver = false;
let animId = null;
let lastTime = 0;
let moveTimer = 0;
const MOVE_INTERVAL = 6500; // МАКСИМАЛЬНО МЕДЛЕННО (было 150)

document.getElementById('high').textContent = high;

// ===== ИНИЦИАЛИЗАЦИЯ =====
function init() {
    const mid = Math.floor(GRID/2);
    snake = [{x:mid, y:mid}, {x:mid-1, y:mid}, {x:mid-2, y:mid}];
    dir = {x:1, y:0};
    nextDir = {x:1, y:0};
    score = 0;
    gameOver = false;
    moveTimer = 0;
    document.getElementById('score').textContent = '0';
    spawnFood();
    render();
}

function spawnFood() {
    const free = [];
    for (let i=0; i<GRID; i++) {
        for (let j=0; j<GRID; j++) {
            if (!snake.some(s => s.x===i && s.y===j)) free.push({x:i, y:j});
        }
    }
    if (free.length === 0) { gameOver = true; return; }
    food = free[Math.floor(Math.random() * free.length)];
}

// ===== ОБНОВЛЕНИЕ =====
function update(dt) {
    if (!gameRunning || gameOver) return;
    
    moveTimer += dt * 1000;
    if (moveTimer < MOVE_INTERVAL) return;
    moveTimer = 0;
    
    dir = {...nextDir};
    const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
    
    if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) {
        endGame();
        return;
    }
    
    if (food && head.x === food.x && head.y === food.y) {
        score += 10;
        document.getElementById('score').textContent = score;
        Sound.play('click');
        snake.unshift({...head});
        spawnFood();
        if (gameOver) { endGame(); return; }
    } else {
        snake.pop();
        snake.unshift({...head});
    }
    
    for (let i=1; i<snake.length; i++) {
        if (snake[i].x === head.x && snake[i].y === head.y) {
            endGame();
            return;
        }
    }
}

function endGame() {
    gameOver = true;
    gameRunning = false;
    Sound.play('lose');
    if (score > high) {
        high = score;
        Records.set('snake', high);
        document.getElementById('high').textContent = high;
    }
    render();
    showOverlay('💀 Игра окончена', `Счёт: ${score}`);
}

// ===== ОТРИСОВКА =====
function render() {
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0, 0, 400, 400);
    
    if (food) {
        ctx.shadowColor = '#ff6b6b';
        ctx.shadowBlur = 20;
        ctx.fillStyle = '#ff6b6b';
        ctx.beginPath();
        ctx.arc(food.x*CELL + CELL/2, food.y*CELL + CELL/2, CELL/2-2, 0, Math.PI*2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }
    
    snake.forEach((s, i) => {
        const x = s.x * CELL, y = s.y * CELL;
        const isHead = i === 0;
        const hue = 170 - (i / snake.length) * 40;
        const light = 55 - (i / snake.length) * 25;
        ctx.shadowColor = isHead ? 'rgba(78,205,196,0.5)' : 'rgba(78,205,196,0.2)';
        ctx.shadowBlur = isHead ? 20 : 10;
        ctx.fillStyle = isHead ? '#4ecdc4' : `hsl(${hue}, 70%, ${light}%)`;
        ctx.fillRect(x+1, y+1, CELL-2, CELL-2);
        ctx.shadowBlur = 0;
    });
}

// ===== УПРАВЛЕНИЕ =====
document.addEventListener('keydown', (e) => {
    const k = e.key;
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(k)) e.preventDefault();
    if (!gameRunning || gameOver) return;
    if (k === 'ArrowUp' && dir.y !== 1) nextDir = {x:0, y:-1};
    if (k === 'ArrowDown' && dir.y !== -1) nextDir = {x:0, y:1};
    if (k === 'ArrowLeft' && dir.x !== 1) nextDir = {x:-1, y:0};
    if (k === 'ArrowRight' && dir.x !== -1) nextDir = {x:1, y:0};
});

// ===== ОВЕРЛЕЙ =====
function showOverlay(title, sub) {
    overlay.querySelector('h2').textContent = title;
    overlay.querySelector('p').textContent = sub || '';
    overlay.classList.add('active');
}
function hideOverlay() { overlay.classList.remove('active'); }

// ===== ЦИКЛ =====
function loop(timestamp) {
    if (!gameRunning) { animId = requestAnimationFrame(loop); return; }
    if (!lastTime) lastTime = timestamp;
    const dt = Math.min(timestamp - lastTime, 33) / 16.67;
    lastTime = timestamp;
    
    update(dt);
    render();
    animId = requestAnimationFrame(loop);
}

// ===== РЕСТАРТ =====
function resetGame() {
    if (animId) cancelAnimationFrame(animId);
    hideOverlay();
    init();
    gameRunning = true;
    moveTimer = 0;
    lastTime = 0;
    animId = requestAnimationFrame(loop);
}

startBtn.addEventListener('click', resetGame);

// ===== СТАРТ =====
init();
showOverlay('🐍 Змейка', 'Нажми "Начать"');
</script>
</body>
</html>
