<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏎️ Гонки</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .game-wrapper { max-width: 460px; margin: 0 auto; }
        .canvas-wrapper { position: relative; border-radius: 12px; overflow: hidden; background: #0a0a1a; touch-action: none; }
        canvas { display: block; width: 100%; height: auto; touch-action: none; }
        .game-overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: rgba(0,0,0,0.75); backdrop-filter: blur(8px);
            opacity: 0; pointer-events: none; transition: opacity 0.4s; border-radius: 12px;
            z-index: 5;
        }
        .game-overlay.active { opacity: 1; pointer-events: all; }
        .game-overlay h2 { font-size: 32px; color: #ffb74d; }
        .game-overlay .btn { margin-top: 16px; padding: 12px 36px; background: #ffb74d; border: none; border-radius: 10px; color: #0a0a1a; font-weight: 700; font-size: 16px; cursor: pointer; transition: transform 0.2s; }
        .game-overlay .btn:hover { transform: scale(1.05); }
        
        #touch-controls {
            position: absolute !important;
            bottom: 15px !important;
            left: 0 !important;
            right: 0 !important;
            display: none !important;
            justify-content: space-between !important;
            padding: 0 15px !important;
            pointer-events: none !important;
            z-index: 10 !important;
        }
        #touch-controls .btn-group {
            display: flex !important;
            gap: 10px !important;
            pointer-events: all !important;
        }
        #touch-controls button {
            width: 65px !important;
            height: 65px !important;
            border-radius: 50% !important;
            border: 2px solid rgba(255,255,255,0.2) !important;
            background: rgba(255,255,255,0.1) !important;
            backdrop-filter: blur(8px) !important;
            color: white !important;
            font-size: 28px !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            touch-action: none !important;
            user-select: none !important;
            -webkit-user-select: none !important;
            transition: background 0.15s !important;
            pointer-events: all !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3) !important;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5) !important;
            padding: 0 !important;
            line-height: 1 !important;
        }
        #touch-controls button:active {
            background: rgba(255,255,255,0.3) !important;
            transform: scale(0.9) !important;
        }
        @media (max-width: 600px) {
            #touch-controls { display: flex !important; }
            #touch-controls button { width: 55px !important; height: 55px !important; font-size: 22px !important; }
        }
        @media (pointer: coarse) {
            #touch-controls { display: flex !important; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="game-header">
        <h2>🏎️ Гонки</h2>
        <div class="stats"><span>🏆 <b id="score">0</b></span><span>👑 <b id="high">0</b></span></div>
        <a href="../index.html" class="menu-btn">← Меню</a>
    </div>
    <div class="canvas-wrapper">
        <canvas id="game" width="400" height="600"></canvas>
        <div class="game-overlay" id="overlay">
            <h2>🏎️ Гонки</h2>
            <p style="color:#888;margin:4px 0;">⬅➡</p>
            <button class="btn" id="startBtn">▶ Начать</button>
        </div>
        
        <div id="touch-controls">
            <div class="btn-group">
                <button data-action="left">⬅</button>
                <button data-action="right">➡</button>
            </div>
            <div class="btn-group">
                <button data-action="restart" style="width:55px !important;height:55px !important;font-size:22px !important;">🔄</button>
            </div>
        </div>
    </div>
    <div class="game-controls">
        <div class="keys"><kbd>⬅</kbd><kbd>➡</kbd></div>
        <button class="reset-btn" onclick="resetGame()">🔄 Новая</button>
    </div>
</div>
<script src="../engine.js"></script>
<script>
const W = 400, H = 600;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');

const player = {x: 175, y: 520, w: 50, h: 70, speed: 8};
let enemies = [];
let score = 0, high = Records.get('racer') || 0;
let gameRunning = false, gameOver = false;
let animId = null, lastTime = 0, roadOffset = 0;
let keys = {};
let touchX = null;

document.getElementById('high').textContent = high;

const CAR_COLORS = ['#ef5350','#4fc3f7','#ffd93d','#81c784','#ce93d8','#ffb74d'];

// ===== СЕНСОРНОЕ УПРАВЛЕНИЕ =====
function setupTouchControls() {
    const buttons = document.querySelectorAll('#touch-controls button[data-action]');
    buttons.forEach(btn => {
        const action = btn.dataset.action;
        const isLeft = action === 'left';
        const isRight = action === 'right';
        
        let interval = null;
        const startPress = (e) => {
            e.preventDefault();
            if (!gameRunning || gameOver) return;
            if (isLeft) { player.x = Math.max(0, player.x - player.speed); }
            if (isRight) { player.x = Math.min(W - player.w, player.x + player.speed); }
            interval = setInterval(() => {
                if (!gameRunning || gameOver) { clearInterval(interval); return; }
                if (isLeft) { player.x = Math.max(0, player.x - player.speed * 0.8); }
                if (isRight) { player.x = Math.min(W - player.w, player.x + player.speed * 0.8); }
            }, 50);
            btn.style.background = 'rgba(255,255,255,0.3)';
        };
        const endPress = (e) => {
            e.preventDefault();
            clearInterval(interval);
            btn.style.background = 'rgba(255,255,255,0.1)';
        };
        btn.addEventListener('touchstart', startPress, { passive: false });
        btn.addEventListener('touchend', endPress, { passive: false });
        btn.addEventListener('touchcancel', endPress, { passive: false });
        btn.addEventListener('mousedown', startPress);
        btn.addEventListener('mouseup', endPress);
        btn.addEventListener('mouseleave', endPress);
    });
    
    // Движение пальцем по экрану
    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (!gameRunning || gameOver) return;
        const rect = canvas.getBoundingClientRect();
        const scale = W / rect.width;
        const touch = e.touches[0];
        const x = (touch.clientX - rect.left) * scale;
        // Смещаем машину к пальцу
        const targetX = x - player.w/2;
        player.x = Math.max(0, Math.min(W - player.w, targetX));
    }, { passive: false });
}

function addEnemy() {
    const w = 35 + Math.random()*25;
    const h = 45 + Math.random()*25;
    enemies.push({
        x: Math.random()*(W-w-10)+5,
        y: -h,
        w, h,
        speed: 2 + Math.random()*2.5 + score/300,
        color: CAR_COLORS[Math.floor(Math.random()*CAR_COLORS.length)]
    });
}

// ===== ОТРИСОВКА =====
function render() {
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0, 0, W, H);
    
    roadOffset = (roadOffset + 4) % 50;
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 3;
    ctx.setLineDash([25, 25]);
    ctx.lineDashOffset = -roadOffset;
    ctx.beginPath();
    ctx.moveTo(W/2, 0);
    ctx.lineTo(W/2, H);
    ctx.stroke();
    ctx.setLineDash([]);
    
    enemies.forEach(e => {
        ctx.shadowColor = e.color;
        ctx.shadowBlur = 12;
        ctx.fillStyle = e.color;
        ctx.fillRect(e.x, e.y, e.w, e.h);
        ctx.shadowBlur = 0;
        ctx.fillStyle = 'rgba(255,255,255,0.12)';
        ctx.fillRect(e.x+4, e.y+4, e.w-8, e.h*0.25);
        ctx.fillRect(e.x+4, e.y+e.h*0.5, e.w-8, e.h*0.2);
    });
    
    ctx.shadowColor = '#4ecdc4';
    ctx.shadowBlur = 25;
    ctx.fillStyle = '#4ecdc4';
    ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fillRect(player.x+6, player.y+8, player.w-12, player.h*0.28);
    ctx.fillRect(player.x+6, player.y+player.h*0.5, player.w-12, player.h*0.22);
    
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.font = 'bold 24px Arial';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 10;
    ctx.fillText(score, 12, 12);
    ctx.shadowBlur = 0;
    
    if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, H/2-50, W, 100);
        ctx.fillStyle = '#ef5350';
        ctx.font = 'bold 28px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('💀 Врезался!', W/2, H/2+6);
        ctx.fillStyle = '#888';
        ctx.font = '16px Arial';
        ctx.fillText(`Счёт: ${score}`, W/2, H/2+44);
    }
}

// ===== ОБНОВЛЕНИЕ =====
function update(dt) {
    if (!gameRunning || gameOver) return;
    
    score++;
    document.getElementById('score').textContent = score;
    
    if (enemies.length < 5 && Math.random() < 0.02 * (1 + score/200)) addEnemy();
    
    for (let i=enemies.length-1; i>=0; i--) {
        const e = enemies[i];
        e.y += e.speed * dt;
        if (e.y > H+20) { enemies.splice(i, 1); continue; }
        if (e.x < player.x + player.w - 4 && e.x + e.w > player.x + 4 &&
            e.y < player.y + player.h - 4 && e.y + e.h > player.y + 4) {
            gameOver = true; gameRunning = false;
            Sound.play('lose');
            if (score > high) {
                high = score;
                Records.set('racer', high);
                document.getElementById('high').textContent = high;
            }
            render();
            return;
        }
    }
}

// ===== КЛАВИАТУРА =====
document.addEventListener('keydown', e => {
    keys[e.key] = true;
    if (['ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

function movePlayer() {
    if (!gameRunning || gameOver) { requestAnimationFrame(movePlayer); return; }
    if (keys['ArrowLeft']) player.x = Math.max(0, player.x - player.speed);
    if (keys['ArrowRight']) player.x = Math.min(W - player.w, player.x + player.speed);
    requestAnimationFrame(movePlayer);
}

// ===== ОВЕРЛЕЙ =====
function showOverlay(title, sub) {
    overlay.querySelector('h2').textContent = title;
    overlay.querySelector('p').textContent = sub || '';
    overlay.classList.add('active');
}
function hideOverlay() { overlay.classList.remove('active'); }

// ===== ЦИКЛ =====
function loop(timestamp) {
    if (!gameRunning) { animId = requestAnimationFrame(loop); return; }
    if (!lastTime) lastTime = timestamp;
    const dt = Math.min(timestamp - lastTime, 33) / 16.67;
    lastTime = timestamp;
    
    update(dt);
    render();
    animId = requestAnimationFrame(loop);
}

// ===== РЕСТАРТ =====
function resetGame() {
    if (animId) cancelAnimationFrame(animId);
    enemies = [];
    score = 0;
    gameOver = false;
    gameRunning = true;
    player.x = W/2 - player.w/2;
    document.getElementById('score').textContent = '0';
    lastTime = 0;
    hideOverlay();
    animId = requestAnimationFrame(loop);
}

startBtn.addEventListener('click', resetGame);

// ===== СТАРТ =====
setupTouchControls();
showOverlay('🏎️ Гонки', 'Нажми "Начать"');
movePlayer();
</script>
</body>
</html>
