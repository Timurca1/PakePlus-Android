<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏓 Pong</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .game-wrapper { max-width: 660px; margin: 0 auto; }
        .canvas-wrapper { position: relative; border-radius: 12px; overflow: hidden; background: #0a0a1a; touch-action: none; }
        canvas { display: block; width: 100%; height: auto; touch-action: none; }
        .game-overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: rgba(0,0,0,0.75); backdrop-filter: blur(8px);
            opacity: 0; pointer-events: none; transition: opacity 0.4s; border-radius: 12px;
            z-index: 5;
        }
        .game-overlay.active { opacity: 1; pointer-events: all; }
        .game-overlay h2 { font-size: 32px; color: #64b5f6; }
        .game-overlay .btn { margin-top: 16px; padding: 12px 36px; background: #64b5f6; border: none; border-radius: 10px; color: #0a0a1a; font-weight: 700; font-size: 16px; cursor: pointer; transition: transform 0.2s; }
        .game-overlay .btn:hover { transform: scale(1.05); }
        
        #touch-controls {
            position: absolute !important;
            bottom: 15px !important;
            left: 0 !important;
            right: 0 !important;
            display: none !important;
            justify-content: space-between !important;
            padding: 0 15px !important;
            pointer-events: none !important;
            z-index: 10 !important;
        }
        #touch-controls .btn-group {
            display: flex !important;
            gap: 10px !important;
            pointer-events: all !important;
        }
        #touch-controls button {
            width: 65px !important;
            height: 65px !important;
            border-radius: 50% !important;
            border: 2px solid rgba(255,255,255,0.2) !important;
            background: rgba(255,255,255,0.1) !important;
            backdrop-filter: blur(8px) !important;
            color: white !important;
            font-size: 28px !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            touch-action: none !important;
            user-select: none !important;
            -webkit-user-select: none !important;
            transition: background 0.15s !important;
            pointer-events: all !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3) !important;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5) !important;
            padding: 0 !important;
            line-height: 1 !important;
        }
        #touch-controls button:active {
            background: rgba(255,255,255,0.3) !important;
            transform: scale(0.9) !important;
        }
        .controls-extra { display: flex; gap: 16px; align-items: center; color: #888; font-size: 13px; }
        .controls-extra input[type="range"] { width: 80px; accent-color: #4ecdc4; background: #333; height: 4px; border-radius: 2px; }
        @media (max-width: 600px) {
            #touch-controls { display: flex !important; }
            #touch-controls button { width: 55px !important; height: 55px !important; font-size: 22px !important; }
        }
        @media (pointer: coarse) {
            #touch-controls { display: flex !important; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="game-header">
        <h2>🏓 Pong</h2>
        <div class="stats"><span>👤 <b id="p1Score">0</b></span><span>🤖 <b id="p2Score">0</b></span><span>⚡ <b id="speedDisplay">1</b></span></div>
        <a href="../index.html" class="menu-btn">← Меню</a>
    </div>
    <div class="canvas-wrapper">
        <canvas id="game" width="600" height="400"></canvas>
        <div class="game-overlay" id="overlay">
            <h2>🏓 Pong</h2>
            <p style="color:#888;margin:4px 0;">⬆⬇</p>
            <button class="btn" id="startBtn">▶ Начать</button>
        </div>
        
        <div id="touch-controls">
            <div class="btn-group">
                <button data-action="up">⬆</button>
                <button data-action="down">⬇</button>
            </div>
            <div class="btn-group">
                <button data-action="restart" style="width:55px !important;height:55px !important;font-size:22px !important;">🔄</button>
            </div>
        </div>
    </div>
    <div class="game-controls">
        <div class="keys"><kbd>⬆</kbd><kbd>⬇</kbd></div>
        <div class="controls-extra">
            <label>Скорость ИИ <input type="range" id="aiSpeed" min="1" max="8" value="4"></label>
            <button class="reset-btn" onclick="resetGame()">🔄 Новая</button>
        </div>
    </div>
</div>
<script src="../engine.js"></script>
<script>
const W = 600, H = 400;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');
const aiSpeedRange = document.getElementById('aiSpeed');

// ===== СОСТОЯНИЕ =====
const player = {x: 20, y: H/2-50, w: 14, h: 100, speed: 10};
const ai = {x: W-34, y: H/2-50, w: 14, h: 100, speed: 4};
const ball = {x: W/2, y: H/2, r: 8, dx: 7, dy: 4, speed: 7, trail: []};

let p1Score = 0, p2Score = 0;
let speedLevel = 1;
let gameRunning = false, gameOver = false;
let animId = null, lastTime = 0;
let keys = {};
let touchY = null;

document.getElementById('p1Score').textContent = '0';
document.getElementById('p2Score').textContent = '0';

// ===== СЕНСОРНОЕ УПРАВЛЕНИЕ =====
function setupTouchControls() {
    const buttons = document.querySelectorAll('#touch-controls button[data-action]');
    buttons.forEach(btn => {
        const action = btn.dataset.action;
        const isUp = action === 'up';
        const isDown = action === 'down';
        
        let interval = null;
        const startPress = (e) => {
            e.preventDefault();
            if (!gameRunning || gameOver) return;
            if (isUp) { player.y = Math.max(0, player.y - player.speed); }
            if (isDown) { player.y = Math.min(H - player.h, player.y + player.speed); }
            interval = setInterval(() => {
                if (!gameRunning || gameOver) { clearInterval(interval); return; }
                if (isUp) { player.y = Math.max(0, player.y - player.speed * 0.8); }
                if (isDown) { player.y = Math.min(H - player.h, player.y + player.speed * 0.8); }
            }, 50);
            btn.style.background = 'rgba(255,255,255,0.3)';
        };
        const endPress = (e) => {
            e.preventDefault();
            clearInterval(interval);
            btn.style.background = 'rgba(255,255,255,0.1)';
        };
        btn.addEventListener('touchstart', startPress, { passive: false });
        btn.addEventListener('touchend', endPress, { passive: false });
        btn.addEventListener('touchcancel', endPress, { passive: false });
        btn.addEventListener('mousedown', startPress);
        btn.addEventListener('mouseup', endPress);
        btn.addEventListener('mouseleave', endPress);
    });
    
    // Движение пальцем по экрану
    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (!gameRunning || gameOver) return;
        const rect = canvas.getBoundingClientRect();
        const scale = H / rect.height;
        const touch = e.touches[0];
        const y = (touch.clientY - rect.top) * scale;
        player.y = Math.max(0, Math.min(H - player.h, y - player.h/2));
    }, { passive: false });
}

// ===== ОТРИСОВКА =====
function render() {
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0, 0, W, H);
    
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.lineWidth = 2;
    ctx.setLineDash([12, 18]);
    ctx.beginPath();
    ctx.moveTo(W/2, 0);
    ctx.lineTo(W/2, H);
    ctx.stroke();
    ctx.setLineDash([]);
    
    ball.trail.forEach((t, i) => {
        const a = (i / ball.trail.length) * 0.2;
        ctx.globalAlpha = a;
        ctx.fillStyle = '#64b5f6';
        const r = ball.r * (0.3 + 0.7 * i / ball.trail.length);
        ctx.beginPath();
        ctx.arc(t.x, t.y, r, 0, Math.PI*2);
        ctx.fill();
    });
    ctx.globalAlpha = 1;
    
    ctx.shadowColor = '#64b5f6';
    ctx.shadowBlur = 25;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
    
    ctx.shadowColor = '#4ecdc4';
    ctx.shadowBlur = 20;
    ctx.fillStyle = '#4ecdc4';
    ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.shadowBlur = 0;
    
    ctx.shadowColor = '#ef5350';
    ctx.shadowBlur = 20;
    ctx.fillStyle = '#ef5350';
    ctx.fillRect(ai.x, ai.y, ai.w, ai.h);
    ctx.shadowBlur = 0;
    
    ctx.font = 'bold 48px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    ctx.fillText(p1Score, W/4, 16);
    ctx.fillText(p2Score, W*3/4, 16);
    
    if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, H/2-50, W, 100);
        ctx.fillStyle = p1Score > p2Score ? '#4ecdc4' : '#ef5350';
        ctx.font = 'bold 30px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(p1Score > p2Score ? '🏆 Победа!' : '💀 Поражение', W/2, H/2+6);
        ctx.fillStyle = '#888';
        ctx.font = '16px Arial';
        ctx.fillText(`${p1Score} : ${p2Score}`, W/2, H/2+44);
    }
}

// ===== ОБНОВЛЕНИЕ =====
function resetBall() {
    ball.x = W/2;
    ball.y = H/2 + (Math.random()-0.5)*60;
    const angle = (Math.random()-0.5)*0.8;
    const dir = Math.random() > 0.5 ? 1 : -1;
    ball.dx = dir * ball.speed * Math.cos(angle);
    ball.dy = ball.speed * Math.sin(angle);
    ball.trail = [];
}

function update(dt) {
    if (!gameRunning || gameOver) return;
    
    ball.trail.push({x: ball.x, y: ball.y});
    if (ball.trail.length > 10) ball.trail.shift();
    
    ball.x += ball.dx * dt;
    ball.y += ball.dy * dt;
    
    if (ball.y - ball.r < 0 || ball.y + ball.r > H) {
        ball.dy *= -1;
        Sound.play('move');
    }
    
    if (ball.x - ball.r < -20) {
        p2Score++;
        document.getElementById('p2Score').textContent = p2Score;
        Sound.play('lose');
        if (p2Score >= 5) { gameOver = true; gameRunning = false; return; }
        resetBall(); speedLevel = 1;
        document.getElementById('speedDisplay').textContent = speedLevel;
        return;
    }
    if (ball.x + ball.r > W + 20) {
        p1Score++;
        document.getElementById('p1Score').textContent = p1Score;
        Sound.play('win');
        if (p1Score >= 5) { gameOver = true; gameRunning = false; return; }
        resetBall(); speedLevel = 1;
        document.getElementById('speedDisplay').textContent = speedLevel;
        return;
    }
    
    if (ball.dx < 0 && ball.x - ball.r < player.x + player.w &&
        ball.x + ball.r > player.x && ball.y > player.y && ball.y < player.y + player.h) {
        const hit = (ball.y - player.y) / player.h;
        ball.dx = Math.abs(ball.dx) * 1.05;
        ball.dy = (hit - 0.5) * 8 * (1 + speedLevel * 0.1);
        speedLevel = Math.min(5, speedLevel + 0.3);
        document.getElementById('speedDisplay').textContent = Math.floor(speedLevel);
        ball.speed = 6 + speedLevel * 0.5;
        Sound.play('click');
    }
    
    if (ball.dx > 0 && ball.x + ball.r > ai.x &&
        ball.x - ball.r < ai.x + ai.w && ball.y > ai.y && ball.y < ai.y + ai.h) {
        const hit = (ball.y - ai.y) / ai.h;
        ball.dx = -Math.abs(ball.dx) * 1.02;
        ball.dy = (hit - 0.5) * 8 * (1 + speedLevel * 0.05);
        Sound.play('click');
    }
    
    const aiSpeed = parseFloat(aiSpeedRange.value);
    const target = ball.y - ai.h/2;
    const diff = target - ai.y;
    if (Math.abs(diff) > 8) {
        ai.y += Math.sign(diff) * aiSpeed * (0.6 + speedLevel * 0.04) * dt;
    }
    ai.y = Math.max(0, Math.min(H - ai.h, ai.y));
}

// ===== КЛАВИАТУРА =====
document.addEventListener('keydown', e => {
    keys[e.key] = true;
    if (['ArrowUp','ArrowDown'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

function movePlayer() {
    if (!gameRunning || gameOver) { requestAnimationFrame(movePlayer); return; }
    if (keys['ArrowUp']) player.y = Math.max(0, player.y - player.speed);
    if (keys['ArrowDown']) player.y = Math.min(H - player.h, player.y + player.speed);
    requestAnimationFrame(movePlayer);
}

// ===== ОВЕРЛЕЙ =====
function showOverlay(title, sub) {
    overlay.querySelector('h2').textContent = title;
    overlay.querySelector('p').textContent = sub || '';
    overlay.classList.add('active');
}
function hideOverlay() { overlay.classList.remove('active'); }

// ===== ЦИКЛ =====
function loop(timestamp) {
    if (!gameRunning) { animId = requestAnimationFrame(loop); return; }
    if (!lastTime) lastTime = timestamp;
    const dt = Math.min(timestamp - lastTime, 33) / 16.67;
    lastTime = timestamp;
    
    update(dt);
    render();
    animId = requestAnimationFrame(loop);
}

// ===== РЕСТАРТ =====
function resetGame() {
    if (animId) cancelAnimationFrame(animId);
    p1Score = 0; p2Score = 0;
    speedLevel = 1;
    gameOver = false; gameRunning = true;
    document.getElementById('p1Score').textContent = '0';
    document.getElementById('p2Score').textContent = '0';
    document.getElementById('speedDisplay').textContent = '1';
    player.y = H/2 - 50;
    ai.y = H/2 - 50;
    ball.speed = 7;
    resetBall();
    lastTime = 0;
    hideOverlay();
    animId = requestAnimationFrame(loop);
}

startBtn.addEventListener('click', resetGame);

// ===== СТАРТ =====
resetBall();
setupTouchControls();
showOverlay('🏓 Pong', 'Нажми "Начать"');
movePlayer();
</script>
</body>
</html>
